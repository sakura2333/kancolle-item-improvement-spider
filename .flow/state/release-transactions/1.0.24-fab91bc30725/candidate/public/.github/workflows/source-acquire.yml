name: Acquire Spider Sources

on:
  schedule:
    # 03:17 JST / 02:17 China Standard Time: reserve the external-site low-traffic window for network acquisition.
    - cron: '17 18 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: kancolle-source-acquire
  cancel-in-progress: false

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: ${{ github.workspace }}
      START2_CACHE_MAX_AGE_HOURS: '24'
    steps:
      - name: Checkout public main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve previous successful source snapshot
        id: previous
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          url = (
              f"https://api.github.com/repos/{repository}/actions/workflows/"
              "source-acquire.yml/runs?branch=main&status=success&per_page=1"
          )
          request = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.load(response)
          runs = payload.get("workflow_runs") or []
          run_id = str(runs[0]["id"]) if runs else ""
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"run_id={run_id}\n")
          PY

      - name: Download previous source snapshot
        if: steps.previous.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: kancolle-source-bundle
          path: ${{ runner.temp }}/previous-source-bundle
          run-id: ${{ steps.previous.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Setup mise tools
        uses: jdx/mise-action@v4.2.0
        with:
          cache: true

      - name: Sync locked acquisition environment
        run: |
          set -euo pipefail
          mise exec -- uv sync --locked
          mise exec -- uv run --locked playwright install --with-deps chromium

      - name: Acquire immutable source bundle
        run: |
          set -euo pipefail
          EXTRA=()
          if [ -f "$RUNNER_TEMP/previous-source-bundle/source-bundle.lock.json" ]; then
            EXTRA+=(--seed-bundle "$RUNNER_TEMP/previous-source-bundle")
          fi
          mise exec -- uv run --locked python -m automation.acquire.cli \
            --output "$RUNNER_TEMP/source-bundle" \
            "${EXTRA[@]}"

      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: kancolle-source-bundle
          path: ${{ runner.temp }}/source-bundle
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
