name: Build Data Candidate

on:
  schedule:
    # 15:17 JST / 14:17 China Standard Time: CPU-only build runs 12 hours after acquisition.
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Optional successful Acquire run ID; empty uses the latest successful Acquire run'
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: kancolle-data-publication
  cancel-in-progress: false

jobs:
  resolve-source:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    outputs:
      run_id: ${{ steps.resolve.outputs.run_id }}
      run_attempt: ${{ steps.resolve.outputs.run_attempt }}
      artifact_id: ${{ steps.resolve.outputs.artifact_id }}
      artifact_name: ${{ steps.resolve.outputs.artifact_name }}
      artifact_digest: ${{ steps.resolve.outputs.artifact_digest }}
      source_head_sha: ${{ steps.resolve.outputs.source_head_sha }}
      skip: ${{ steps.resolve.outputs.skip }}
      reason: ${{ steps.resolve.outputs.reason }}
    steps:
      - name: Checkout workflow commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Resolve immutable successful source bundle
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          python3 -m automation.compute.source_resolver \
            --repository "$GITHUB_REPOSITORY" \
            --token "$GH_TOKEN" \
            --source-run-id "$REQUESTED_RUN_ID" \
            --github-output "$GITHUB_OUTPUT"

      - name: Record deferred build
        if: steps.resolve.outputs.skip == 'true'
        run: |
          printf 'Build deferred: %s. A successful Acquire is required.\n' '${{ steps.resolve.outputs.reason }}' \
            >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: resolve-source
    if: needs.resolve-source.outputs.skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.plan.outputs.should_publish }}
    timeout-minutes: 120
    env:
      PYTHONPATH: ${{ github.workspace }}
      SOURCE_RUN_ID: ${{ needs.resolve-source.outputs.run_id }}
      SOURCE_RUN_ATTEMPT: ${{ needs.resolve-source.outputs.run_attempt }}
      SOURCE_ARTIFACT_ID: ${{ needs.resolve-source.outputs.artifact_id }}
      SOURCE_ARTIFACT_NAME: ${{ needs.resolve-source.outputs.artifact_name }}
      SOURCE_ARTIFACT_DIGEST: ${{ needs.resolve-source.outputs.artifact_digest }}
      SOURCE_HEAD_SHA: ${{ needs.resolve-source.outputs.source_head_sha }}
    steps:
      - name: Checkout workflow commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Download exact frozen source artifact
        uses: actions/download-artifact@v4
        with:
          artifact-ids: ${{ env.SOURCE_ARTIFACT_ID }}
          path: ${{ runner.temp }}/source-bundle
          merge-multiple: true
          run-id: ${{ env.SOURCE_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Verify downloaded source bundle layout
        run: |
          set -euo pipefail
          test -f "$RUNNER_TEMP/source-bundle/bundle-manifest.json"
          test -f "$RUNNER_TEMP/source-bundle/source-bundle.lock.json"

      - name: Freeze source artifact selection
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "schemaVersion": 1,
              "workflow": "source-acquire.yml",
              "workflowRunId": int(os.environ["SOURCE_RUN_ID"]),
              "runAttempt": int(os.environ["SOURCE_RUN_ATTEMPT"]),
              "artifactId": int(os.environ["SOURCE_ARTIFACT_ID"]),
              "artifactName": os.environ["SOURCE_ARTIFACT_NAME"],
              "artifactDigest": os.environ["SOURCE_ARTIFACT_DIGEST"],
              "sourceHeadSha": os.environ["SOURCE_HEAD_SHA"],
          }
          Path(os.environ["RUNNER_TEMP"], "source-selection.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.11.28'
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Sync locked build environment
        run: uv sync --locked

      - name: Load previous online baseline
        id: baseline
        run: |
          set -euo pipefail
          BASELINE="$RUNNER_TEMP/kancolle-data-baseline.json"
          ONLINE_MANIFEST="$RUNNER_TEMP/online-package-manifest.json"
          if git fetch --no-tags origin refs/heads/online:refs/remotes/origin/online 2>/dev/null \
            && git cat-file -e 'refs/remotes/origin/online:.generated-state/reports/verification-report.json' 2>/dev/null \
            && git cat-file -e 'refs/remotes/origin/online:dist/packages/kancolle-data/manifest.json' 2>/dev/null; then
            git show 'refs/remotes/origin/online:.generated-state/reports/verification-report.json' > "$BASELINE"
            git show 'refs/remotes/origin/online:dist/packages/kancolle-data/manifest.json' > "$ONLINE_MANIFEST"
            ONLINE_VERSION="$(uv run --locked python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["packageVersion"])' "$ONLINE_MANIFEST")"
            uv run --locked python -m service.data_package.cli set-version --version "$ONLINE_VERSION"
            echo "version=$ONLINE_VERSION" >> "$GITHUB_OUTPUT"
          else
            cat > "$BASELINE" <<'JSON'
          {
            "schemaVersion": 1,
            "contentDigest": null,
            "metrics": {},
            "files": {}
          }
          JSON
            echo "version=" >> "$GITHUB_OUTPUT"
          fi
          echo "path=$BASELINE" >> "$GITHUB_OUTPUT"

      - name: Build from frozen source bundle
        run: |
          set -euo pipefail
          uv run --locked python -m automation.compute.cli prepare \
            --source-bundle "$RUNNER_TEMP/source-bundle" \
            --source-selection "$RUNNER_TEMP/source-selection.json"

      - name: Validate data quality and detect changes
        id: quality
        run: |
          set -euo pipefail
          CURRENT="$RUNNER_TEMP/kancolle-data-current.json"
          RESULT="$RUNNER_TEMP/kancolle-data-validation.json"
          uv run --locked python -m service.data_package.validation.cli validate \
            --baseline '${{ steps.baseline.outputs.path }}' \
            --output "$CURRENT" > "$RESULT"
          CHANGED="$(uv run --locked python -c 'import json,sys; print(str(json.load(open(sys.argv[1], encoding="utf-8"))["changed"]).lower())' "$RESULT")"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "snapshot=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Inspect current npm business content
        id: npm_business
        run: |
          set -euo pipefail
          IDENTITY="$RUNNER_TEMP/npm-business-identities.json"
          uv run --locked python -m automation.release.npm_release_set inspect-business \
            --package-dir dist/packages/kancolle-data \
            --output "$IDENTITY" >/dev/null
          echo "path=$IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Read authoritative npm data state
        id: registry
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./packages/kancolle-data/package.json').name")"
          VERSIONS="$RUNNER_TEMP/npm-published-versions.json"
          STATE="$RUNNER_TEMP/npm-data-state.json"
          PACK_DIR="$RUNNER_TEMP/npm-registry-head-package"
          COMPAT_PACK_DIR="$RUNNER_TEMP/npm-registry-improvement2-package"
          HISTORY_DIR="$RUNNER_TEMP/npm-registry-history"
          rm -rf "$PACK_DIR" "$COMPAT_PACK_DIR" "$HISTORY_DIR"
          mkdir -p "$PACK_DIR" "$COMPAT_PACK_DIR" "$HISTORY_DIR"
          export PACKAGE_NAME VERSIONS STATE PACK_DIR COMPAT_PACK_DIR HISTORY_DIR
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          import subprocess
          import tarfile
          import time
          from pathlib import Path

          from automation.release.consumer_identity import (
              CURRENT_VARIANT,
              IMPROVEMENT2_VARIANT,
              inspect_tarball as inspect_consumer_tarball,
          )
          from automation.release.npm_business_identity import (
              inspect_tarball as inspect_npm_business_tarball,
          )

          stable = re.compile(r"^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$")
          digest_pattern = re.compile(r"^[0-9a-f]{64}$")
          package = os.environ["PACKAGE_NAME"]
          versions_path = Path(os.environ["VERSIONS"])
          state_path = Path(os.environ["STATE"])
          pack_dir = Path(os.environ["PACK_DIR"]).resolve()
          compat_pack_dir = Path(os.environ["COMPAT_PACK_DIR"]).resolve()
          history_dir = Path(os.environ["HISTORY_DIR"]).resolve()

          def npm_json(*args):
              completed = subprocess.run(
                  ["npm", *args],
                  text=True,
                  capture_output=True,
                  check=False,
              )
              combined = "\n".join(
                  part.strip() for part in (completed.stdout, completed.stderr) if part.strip()
              )
              if completed.returncode:
                  if "E404" in combined or "404 Not Found" in combined:
                      return None
                  raise SystemExit(combined or f"npm {' '.join(args)} failed")
              try:
                  return json.loads(completed.stdout)
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"npm {' '.join(args)} returned invalid JSON: {exc}") from exc

          observed = set()
          tags = {}
          for attempt in range(3):
              payload = npm_json("view", package, "versions", "--json")
              if isinstance(payload, str):
                  observed.add(payload)
              elif isinstance(payload, list):
                  observed.update(str(value) for value in payload)
              elif payload is not None:
                  raise SystemExit("npm registry versions response must be a string or JSON array")

              tag_payload = npm_json("view", package, "dist-tags", "--json")
              if isinstance(tag_payload, dict):
                  tags.update({str(key): str(value) for key, value in tag_payload.items()})
              elif tag_payload is not None:
                  raise SystemExit("npm registry dist-tags response must be a JSON object")
              if attempt < 2:
                  time.sleep(5)

          stable_versions = []
          for raw in observed:
              match = stable.fullmatch(str(raw).strip())
              if match:
                  stable_versions.append((tuple(int(part) for part in match.groups()), str(raw).strip()))

          state = {
              "schemaVersion": 1,
              "package": package,
              "versions": [],
              "distTags": tags,
              "head": None,
          }
          if stable_versions:
              _, version = max(stable_versions)
              completed = subprocess.run(
                  [
                      "npm",
                      "pack",
                      f"{package}@{version}",
                      "--ignore-scripts",
                      "--json",
                      "--pack-destination",
                      str(pack_dir),
                  ],
                  text=True,
                  capture_output=True,
                  check=False,
              )
              combined = "\n".join(
                  part.strip() for part in (completed.stdout, completed.stderr) if part.strip()
              )
              if completed.returncode:
                  raise SystemExit(combined or f"npm pack {package}@{version} failed")
              try:
                  packed = json.loads(completed.stdout)
                  filename = str(packed[0]["filename"])
              except (json.JSONDecodeError, IndexError, KeyError, TypeError) as exc:
                  raise SystemExit(f"npm pack returned invalid JSON: {exc}") from exc
              tarball = Path(filename)
              if not tarball.is_absolute():
                  tarball = pack_dir / tarball
              tarball = tarball.resolve()
              if tarball.parent != pack_dir or not tarball.is_file() or tarball.is_symlink():
                  raise SystemExit("npm pack produced an unsafe or missing tarball")

              with tarfile.open(tarball, "r:gz") as archive:
                  package_stream = archive.extractfile("package/package.json")
                  releases_stream = archive.extractfile("package/RELEASES.json")
                  changelog_stream = archive.extractfile("package/CHANGELOG.md")
                  if package_stream is None or releases_stream is None or changelog_stream is None:
                      raise SystemExit(
                          "published npm package lacks package.json, RELEASES.json, or CHANGELOG.md"
                      )
                  package_json = json.loads(package_stream.read().decode("utf-8"))
                  releases_bytes = releases_stream.read()
                  changelog_bytes = changelog_stream.read()
                  releases = json.loads(releases_bytes.decode("utf-8"))
              if package_json.get("name") != package or package_json.get("version") != version:
                  raise SystemExit("published npm package identity does not match registry head")
              if not isinstance(releases, list):
                  raise SystemExit("published RELEASES.json must contain an array")
              digest = str(
                  inspect_consumer_tarball(
                      tarball, variant=CURRENT_VARIANT
                  )["contentDigest"]
              )
              business_digest = str(
                  inspect_npm_business_tarball(tarball)["businessDigest"]
              )
              if not digest_pattern.fullmatch(digest):
                  raise SystemExit(
                      f"published npm registry head {version} lacks a valid canonical consumer identity"
                  )
              if not digest_pattern.fullmatch(business_digest):
                  raise SystemExit(
                      f"published npm registry head {version} lacks a valid npm business identity"
                  )
              (history_dir / "RELEASES.json").write_bytes(releases_bytes)
              (history_dir / "CHANGELOG.md").write_bytes(changelog_bytes)
              sha256 = hashlib.sha256()
              with tarball.open("rb") as stream:
                  for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                      sha256.update(chunk)
              improvement2_version = f"{version}-improvement2"
              compatibility = npm_json(
                  "view",
                  f"{package}@{improvement2_version}",
                  "version",
                  "--json",
              )
              improvement2_exists = str(compatibility or "").strip() == improvement2_version
              improvement2_digest = None
              improvement2_business_digest = None
              improvement2_sha256 = None
              if improvement2_exists:
                  observed.add(improvement2_version)
                  completed = subprocess.run(
                      [
                          "npm",
                          "pack",
                          f"{package}@{improvement2_version}",
                          "--ignore-scripts",
                          "--json",
                          "--pack-destination",
                          str(compat_pack_dir),
                      ],
                      text=True,
                      capture_output=True,
                      check=False,
                  )
                  combined = "\n".join(
                      part.strip()
                      for part in (completed.stdout, completed.stderr)
                      if part.strip()
                  )
                  if completed.returncode:
                      raise SystemExit(
                          combined or f"npm pack {package}@{improvement2_version} failed"
                      )
                  try:
                      packed = json.loads(completed.stdout)
                      compatibility_filename = str(packed[0]["filename"])
                  except (json.JSONDecodeError, IndexError, KeyError, TypeError) as exc:
                      raise SystemExit(
                          f"npm pack returned invalid improvement2 JSON: {exc}"
                      ) from exc
                  compatibility_tarball = Path(compatibility_filename)
                  if not compatibility_tarball.is_absolute():
                      compatibility_tarball = compat_pack_dir / compatibility_tarball
                  compatibility_tarball = compatibility_tarball.resolve()
                  if (
                      compatibility_tarball.parent != compat_pack_dir
                      or not compatibility_tarball.is_file()
                      or compatibility_tarball.is_symlink()
                  ):
                      raise SystemExit(
                          "npm pack produced an unsafe or missing improvement2 tarball"
                      )
                  with tarfile.open(compatibility_tarball, "r:gz") as archive:
                      compatibility_package_stream = archive.extractfile("package/package.json")
                      compatibility_releases_stream = archive.extractfile("package/RELEASES.json")
                      if (
                          compatibility_package_stream is None
                          or compatibility_releases_stream is None
                      ):
                          raise SystemExit(
                              "published improvement2 package lacks package.json or RELEASES.json"
                          )
                      compatibility_package_json = json.loads(
                          compatibility_package_stream.read().decode("utf-8")
                      )
                      compatibility_releases = json.loads(
                          compatibility_releases_stream.read().decode("utf-8")
                      )
                  if (
                      compatibility_package_json.get("name") != package
                      or compatibility_package_json.get("version") != improvement2_version
                  ):
                      raise SystemExit(
                          "published npm improvement2 identity does not match registry head"
                      )
                  if not isinstance(compatibility_releases, list):
                      raise SystemExit(
                          "published improvement2 RELEASES.json must contain an array"
                      )
                  improvement2_digest = str(
                      inspect_consumer_tarball(
                          compatibility_tarball, variant=IMPROVEMENT2_VARIANT
                      )["contentDigest"]
                  )
                  improvement2_business_digest = str(
                      inspect_npm_business_tarball(compatibility_tarball)["businessDigest"]
                  )
                  if not digest_pattern.fullmatch(improvement2_digest):
                      raise SystemExit(
                          f"published npm improvement2 {improvement2_version} lacks a valid "
                          "compatibility consumer identity"
                      )
                  if not digest_pattern.fullmatch(improvement2_business_digest):
                      raise SystemExit(
                          f"published npm improvement2 {improvement2_version} lacks a valid "
                          "npm business identity"
                      )
                  compatibility_hash = hashlib.sha256()
                  with compatibility_tarball.open("rb") as stream:
                      for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                          compatibility_hash.update(chunk)
                  improvement2_sha256 = compatibility_hash.hexdigest()
              state["head"] = {
                  "version": version,
                  "contentDigest": digest,
                  "npmBusinessDigest": business_digest,
                  "tarballSha256": sha256.hexdigest(),
                  "latestTag": tags.get("latest"),
                  "improvement2Version": improvement2_version,
                  "improvement2Exists": improvement2_exists,
                  "improvement2ContentDigest": improvement2_digest,
                  "improvement2NpmBusinessDigest": improvement2_business_digest,
                  "improvement2TarballSha256": improvement2_sha256,
                  "improvement2Tag": tags.get("improvement2"),
              }

          versions = sorted(observed)
          state["versions"] = versions
          versions_path.write_text(
              json.dumps(versions, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          state_path.write_text(
              json.dumps(state, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"
          echo "state=$STATE" >> "$GITHUB_OUTPUT"
          echo "history=$HISTORY_DIR" >> "$GITHUB_OUTPUT"

      - name: Plan stateless publication target
        id: plan
        env:
          CURRENT_SNAPSHOT: ${{ steps.quality.outputs.snapshot }}
          CURRENT_NPM_BUSINESS: ${{ steps.npm_business.outputs.path }}
          ONLINE_SNAPSHOT: ${{ steps.baseline.outputs.path }}
          ONLINE_VERSION: ${{ steps.baseline.outputs.version }}
          REGISTRY_STATE: ${{ steps.registry.outputs.state }}
          PUBLISHED_VERSIONS: ${{ steps.registry.outputs.versions }}
        run: |
          set -euo pipefail
          PLAN="$RUNNER_TEMP/npm-version-plan.json"
          export PLAN
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          stable = re.compile(r"^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$")
          digest_pattern = re.compile(r"^[0-9a-f]{64}$")

          def parse_version(value):
              match = stable.fullmatch(str(value or "").strip())
              if match is None:
                  raise SystemExit(f"unsupported stable semantic version: {value!r}")
              return tuple(int(part) for part in match.groups())

          def format_version(value):
              return ".".join(str(part) for part in value)

          current = json.load(open(os.environ["CURRENT_SNAPSHOT"], encoding="utf-8"))
          npm_business = json.load(
              open(os.environ["CURRENT_NPM_BUSINESS"], encoding="utf-8")
          )
          online = json.load(open(os.environ["ONLINE_SNAPSHOT"], encoding="utf-8"))
          registry = json.load(open(os.environ["REGISTRY_STATE"], encoding="utf-8"))
          versions = json.load(open(os.environ["PUBLISHED_VERSIONS"], encoding="utf-8"))
          repository = json.load(open("packages/kancolle-data/package.json", encoding="utf-8"))

          current_digest = str(current.get("contentDigest") or "").strip().lower()
          current_improvement2_digest = str(
              current.get("improvement2ContentDigest") or ""
          ).strip().lower()
          business_identities = npm_business.get("npmBusinessIdentities")
          if not isinstance(business_identities, dict):
              raise SystemExit("current npm business identity result is invalid")
          current_business_digest = str(
              business_identities.get("current") or ""
          ).strip().lower()
          current_improvement2_business_digest = str(
              business_identities.get("improvement2") or ""
          ).strip().lower()
          online_digest = str(online.get("contentDigest") or "").strip().lower()
          online_improvement2_digest = str(
              online.get("improvement2ContentDigest") or ""
          ).strip().lower()
          online_version = os.environ.get("ONLINE_VERSION", "").strip()
          if not digest_pattern.fullmatch(current_digest):
              raise SystemExit("current verification snapshot lacks a valid canonical consumer identity")
          if not digest_pattern.fullmatch(current_improvement2_digest):
              raise SystemExit("current verification snapshot lacks a valid improvement2 consumer identity")
          if not digest_pattern.fullmatch(current_business_digest):
              raise SystemExit("current npm package lacks a valid business identity")
          if not digest_pattern.fullmatch(current_improvement2_business_digest):
              raise SystemExit("current improvement2 package lacks a valid business identity")
          if online_digest and not digest_pattern.fullmatch(online_digest):
              raise SystemExit("online verification snapshot has an invalid canonical consumer identity")
          if online_improvement2_digest and not digest_pattern.fullmatch(online_improvement2_digest):
              raise SystemExit("online verification snapshot has an invalid improvement2 consumer identity")

          head = registry.get("head")
          if head is not None and not isinstance(head, dict):
              raise SystemExit("npm registry state head must be an object or null")

          head_business_digest = str(
              (head or {}).get("npmBusinessDigest") or ""
          ).strip().lower()
          improvement2_exists = bool((head or {}).get("improvement2Exists"))
          head_improvement2_business_digest = str(
              (head or {}).get("improvement2NpmBusinessDigest") or ""
          ).strip().lower()
          can_reuse_head = (
              bool(head)
              and head_business_digest == current_business_digest
              and (
                  not improvement2_exists
                  or head_improvement2_business_digest
                  == current_improvement2_business_digest
              )
          )

          if can_reuse_head:
              version = str(head["version"])
              improvement2_version = str(head["improvement2Version"])
              improvement2_digest = str(
                  head.get("improvement2ContentDigest") or ""
              ).strip().lower()
              if improvement2_exists and not digest_pattern.fullmatch(improvement2_digest):
                  raise SystemExit(
                      "existing improvement2 registry version lacks a valid consumer identity"
                  )
              aligned = (
                  online_version == version
                  and online_digest == current_digest
                  and online_improvement2_digest == current_improvement2_digest
                  and head.get("latestTag") == version
                  and improvement2_exists
                  and improvement2_digest == current_improvement2_digest
                  and head.get("improvement2Tag") == improvement2_version
              )
              mode = "noop" if aligned else "reconcile-existing-content"
              plan = {
                  "schemaVersion": 1,
                  "shouldPublish": not aligned,
                  "version": version,
                  "reason": (
                      "npm-business-content-unchanged"
                      if aligned
                      else "reconcile-already-published-npm-business-content"
                  ),
                  "mode": mode,
                  "allocatedNewVersion": False,
              }
          else:
              repository_version = str(repository.get("version") or "")
              repository_tuple = parse_version(repository_version)
              published = []
              for raw in versions:
                  if stable.fullmatch(str(raw).strip()):
                      published.append(parse_version(str(raw)))
              latest_tuple = max(published) if published else None
              published_text = {format_version(value) for value in published}
              if repository_version not in published_text and (
                  latest_tuple is None or repository_tuple > latest_tuple
              ):
                  version = repository_version
              else:
                  base = repository_tuple
                  if latest_tuple is not None and latest_tuple > base:
                      base = latest_tuple
                  version = format_version((base[0], base[1], base[2] + 1))
              plan = {
                  "schemaVersion": 1,
                  "shouldPublish": True,
                  "version": version,
                  "reason": "publish-new-npm-business-content",
                  "mode": "publish-new-content",
                  "allocatedNewVersion": True,
              }

          plan["consumerContentDigest"] = current_digest
          plan["improvement2ConsumerContentDigest"] = current_improvement2_digest
          plan["npmBusinessIdentities"] = {
              "schemaVersion": business_identities.get("schemaVersion"),
              "current": current_business_digest,
              "improvement2": current_improvement2_business_digest,
          }
          plan["identitySchemaVersion"] = current.get("identitySchemaVersion")
          plan["registryState"] = registry
          plan["onlineBaseline"] = {
              "version": online_version or None,
              "contentDigest": online_digest or None,
              "improvement2ContentDigest": online_improvement2_digest or None,
          }
          plan["onlineChanged"] = (
              current_digest != online_digest
              or current_improvement2_digest != online_improvement2_digest
          )
          Path(os.environ["PLAN"]).write_text(
              json.dumps(plan, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          SHOULD_PUBLISH="$(python3 -c 'import json,sys; print(str(json.load(open(sys.argv[1], encoding="utf-8"))["shouldPublish"]).lower())' "$PLAN")"
          VERSION="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["version"] or "")' "$PLAN")"
          MODE="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["mode"])' "$PLAN")"
          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "path=$PLAN" >> "$GITHUB_OUTPUT"

      - name: Prepare frozen release projection
        if: steps.plan.outputs.should_publish == 'true'
        env:
          TARGET_VERSION: ${{ steps.plan.outputs.version }}
          PUBLICATION_MODE: ${{ steps.plan.outputs.mode }}
          REGISTRY_HISTORY: ${{ steps.registry.outputs.history }}
          PUBLISHED_VERSIONS: ${{ steps.registry.outputs.versions }}
        run: |
          set -euo pipefail
          for RELEASE_FILE in CHANGELOG.md RELEASES.json; do
            if [ -f "$REGISTRY_HISTORY/$RELEASE_FILE" ]; then
              cp "$REGISTRY_HISTORY/$RELEASE_FILE" "packages/kancolle-data/$RELEASE_FILE"
              cp "$REGISTRY_HISTORY/$RELEASE_FILE" "dist/packages/kancolle-data/$RELEASE_FILE"
            fi
          done
          uv run --locked python -m service.data_package.cli set-version \
            --version "$TARGET_VERSION"
          if [ "$PUBLICATION_MODE" = 'publish-new-content' ]; then
            uv run --locked python -m service.data_package.cli finalize-release \
              --version "$TARGET_VERSION" \
              --snapshot '${{ steps.quality.outputs.snapshot }}' >/dev/null
          fi
          uv run --locked python -m service.data_package.cli refresh-manifest >/dev/null
          uv run --locked python -m automation.release.npm_release_set build \
            --package-dir dist/packages/kancolle-data \
            --output "$RUNNER_TEMP/npm-release-set"

          if [ "$PUBLICATION_MODE" = 'reconcile-existing-content' ]; then
            uv run --locked python -m automation.release.npm_release_set hydrate-published \
              --manifest "$RUNNER_TEMP/npm-release-set/release-set.json" \
              --published-versions "$PUBLISHED_VERSIONS"
          fi

          uv run --locked python -m automation.release.npm_release_set verify \
            "$RUNNER_TEMP/npm-release-set/release-set.json"
          uv run --locked python - '${{ steps.quality.outputs.snapshot }}' "$RUNNER_TEMP/online-state" <<'PY'
          import json
          import subprocess
          import sys
          from pathlib import Path
          from automation.release.generated_state import export_generated_state

          commit = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          result = export_generated_state(
              output_dir=Path(sys.argv[2]),
              base_ref="main",
              base_commit=commit,
              verification_report=Path(sys.argv[1]),
              replace=True,
          )
          print(json.dumps(result, ensure_ascii=False))
          PY

      - name: Freeze immutable build candidate
        run: |
          set -euo pipefail
          EXTRA=()
          if [ '${{ steps.plan.outputs.should_publish }}' = 'true' ]; then
            EXTRA+=(--npm-release-set "$RUNNER_TEMP/npm-release-set")
            EXTRA+=(--online-state "$RUNNER_TEMP/online-state")
          fi
          uv run --locked python -m automation.compute.cli freeze \
            --source-bundle "$RUNNER_TEMP/source-bundle" \
            --source-selection "$RUNNER_TEMP/source-selection.json" \
            --release-plan '${{ steps.plan.outputs.path }}' \
            --verification-report '${{ steps.quality.outputs.snapshot }}' \
            --output "$RUNNER_TEMP/build-candidate" \
            "${EXTRA[@]}"

      - name: Verify frozen build candidate
        run: |
          set -euo pipefail
          CANDIDATE="$RUNNER_TEMP/build-candidate"
          uv run --locked python -m automation.release.cli --candidate "$CANDIDATE"

      - name: Upload build candidate
        uses: actions/upload-artifact@v4
        with:
          name: kancolle-build-candidate
          path: ${{ runner.temp }}/build-candidate
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30

      - name: Record unchanged consumer data
        if: steps.plan.outputs.should_publish != 'true'
        run: |
          printf 'Consumer data already matches authoritative npm state; no publication or reconciliation was required.\n' \
            >> "$GITHUB_STEP_SUMMARY"


  publish:
    needs: build
    if: needs.build.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout workflow commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Download frozen build candidate
        uses: actions/download-artifact@v4
        with:
          name: kancolle-build-candidate
          path: ${{ runner.temp }}/build-candidate

      - name: Checkout candidate commit
        run: |
          set -euo pipefail
          CANDIDATE_COMMIT="$(python3 -c 'import json; print(json.load(open("'"$RUNNER_TEMP"'/build-candidate/bundle-manifest.json", encoding="utf-8"))["commit"])')"
          git checkout --detach "$CANDIDATE_COMMIT"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.11.28'
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Sync locked release environment
        run: uv sync --locked

      - name: Verify frozen candidate and release set
        run: |
          set -euo pipefail
          CANDIDATE="$RUNNER_TEMP/build-candidate"
          uv run --locked python -m automation.release.cli --candidate "$CANDIDATE"
          test "$(uv run --locked python -c 'import json,sys; print(str(json.load(open(sys.argv[1], encoding="utf-8"))["shouldPublish"]).lower())' "$CANDIDATE/release-plan.json")" = true
          uv run --locked python -m automation.release.npm_release_set verify \
            "$CANDIDATE/npm-release-set/release-set.json"
          uv run --locked python -c 'from pathlib import Path; from automation.release.generated_state import verify_generated_state; verify_generated_state(Path("'"$CANDIDATE"'/online-state"))'

      - name: Validate npm credentials
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${NODE_AUTH_TOKEN:-}" || {
            echo 'Repository secret NPM_TOKEN is required before automatic data publishing.' >&2
            exit 1
          }
          npm whoami --registry https://registry.npmjs.org/ >/dev/null

      - name: Publish or reconcile frozen npm variants
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          uv run --locked python -m automation.release.npm_publish \
            "$RUNNER_TEMP/build-candidate/npm-release-set/release-set.json" \
            --audit-dir "$RUNNER_TEMP/npm-publish-audit"

      - name: Upload npm publication audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kancolle-npm-publish-audit
          path: ${{ runner.temp }}/npm-publish-audit
          if-no-files-found: warn
          retention-days: 30

      - name: Push frozen online state
        run: |
          set -euo pipefail
          STATE_DIR="$RUNNER_TEMP/build-candidate/online-state"
          INDEX="$RUNNER_TEMP/online-state.index"
          rm -f "$INDEX"
          export GIT_INDEX_FILE="$INDEX"
          git read-tree --empty
          git --work-tree="$STATE_DIR" add -A
          TREE="$(git write-tree)"
          VERSION="$(uv run --locked python -c 'import json; print(json.load(open("'"$RUNNER_TEMP"'/build-candidate/dist/packages/kancolle-data/package.json", encoding="utf-8"))["version"])')"
          REMOTE_SHA="$(git ls-remote --heads origin refs/heads/online | awk '{print $1}')"
          PARENT=()
          if [ -n "$REMOTE_SHA" ]; then
            PARENT=(-p "$REMOTE_SHA")
          fi
          COMMIT="$(printf 'Publish generated data %s\n' "$VERSION" | \
            GIT_AUTHOR_NAME='github-actions[bot]' \
            GIT_AUTHOR_EMAIL='41898282+github-actions[bot]@users.noreply.github.com' \
            GIT_COMMITTER_NAME='github-actions[bot]' \
            GIT_COMMITTER_EMAIL='41898282+github-actions[bot]@users.noreply.github.com' \
            git commit-tree "$TREE" "${PARENT[@]}")"
          git push "--force-with-lease=refs/heads/online:${REMOTE_SHA}" \
            origin "$COMMIT:refs/heads/online"
          printf 'Published @sakura2333/kancolle-data@%s and updated online.\n' "$VERSION" \
            >> "$GITHUB_STEP_SUMMARY"
