name: Auto Spider + Publish Data

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      publish:
        description: '发布到 online 分支和 npm；关闭时只执行完整验证'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: kancolle-data-pipeline
  cancel-in-progress: false

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout public main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Load previous online baseline
        id: baseline
        run: |
          set -euo pipefail
          BASELINE="$RUNNER_TEMP/kancolle-data-baseline.json"
          ONLINE_MANIFEST="$RUNNER_TEMP/online-package-manifest.json"

          if git fetch --no-tags origin refs/heads/online:refs/remotes/origin/online 2>/dev/null \
            && git cat-file -e 'refs/remotes/origin/online:.generated-state/reports/verification-report.json' 2>/dev/null \
            && git cat-file -e 'refs/remotes/origin/online:packages/kancolle-data/manifest.json' 2>/dev/null; then
            git show 'refs/remotes/origin/online:.generated-state/reports/verification-report.json' > "$BASELINE"
            git show 'refs/remotes/origin/online:packages/kancolle-data/manifest.json' > "$ONLINE_MANIFEST"
            for RELEASE_FILE in CHANGELOG.md RELEASES.json; do
              if git cat-file -e "refs/remotes/origin/online:packages/kancolle-data/$RELEASE_FILE" 2>/dev/null; then
                git show "refs/remotes/origin/online:packages/kancolle-data/$RELEASE_FILE" \
                  > "packages/kancolle-data/$RELEASE_FILE"
              fi
            done
            ONLINE_VERSION="$(python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["packageVersion"])' "$ONLINE_MANIFEST")"
            python -m service.data_package.cli set-version --version "$ONLINE_VERSION"
            echo 'source=online' >> "$GITHUB_OUTPUT"
          else
            python -m service.data_package.validation.cli snapshot --output "$BASELINE" >/dev/null
            echo 'source=main' >> "$GITHUB_OUTPUT"
          fi
          echo "path=$BASELINE" >> "$GITHUB_OUTPUT"

      - name: Run strict Spider main flow
        env:
          DATA_PACKAGE_STRICT: '1'
          VALIDATION_STRICT: '1'
        run: |
          set -euo pipefail
          python -m service.data_package.cli build --strict

      - name: Validate data quality and detect changes
        id: quality
        run: |
          set -euo pipefail
          CURRENT="$RUNNER_TEMP/kancolle-data-current.json"
          RESULT="$RUNNER_TEMP/kancolle-data-validation.json"
          python -m service.data_package.validation.cli validate \
            --baseline '${{ steps.baseline.outputs.path }}' \
            --output "$CURRENT" > "$RESULT"
          CHANGED="$(python -c 'import json,sys; print(str(json.load(open(sys.argv[1], encoding="utf-8"))["changed"]).lower())' "$RESULT")"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "snapshot=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Read npm registry versions
        id: registry
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./packages/kancolle-data/package.json').name")"
          VERSIONS="$RUNNER_TEMP/npm-published-versions.json"
          set +e
          OUTPUT="$(npm view "$PACKAGE_NAME" versions --json 2>&1)"
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            printf '%s\n' "$OUTPUT" > "$VERSIONS"
          elif printf '%s' "$OUTPUT" | grep -Eq 'E404|404 Not Found'; then
            printf '[]\n' > "$VERSIONS"
          else
            printf '%s\n' "$OUTPUT" >&2
            exit "$STATUS"
          fi
          echo "path=$VERSIONS" >> "$GITHUB_OUTPUT"

      - name: Plan package version
        id: plan
        run: |
          set -euo pipefail
          PLAN="$RUNNER_TEMP/npm-version-plan.json"
          python -m service.data_package.cli plan-version \
            --mode scheduled \
            --published-versions '${{ steps.registry.outputs.path }}' \
            --data-changed '${{ steps.quality.outputs.changed }}' \
            --output "$PLAN" >/dev/null
          SHOULD_PUBLISH="$(python -c 'import json,sys; print(str(json.load(open(sys.argv[1], encoding="utf-8"))["shouldPublish"]).lower())' "$PLAN")"
          VERSION="$(python -c 'import json,sys; value=json.load(open(sys.argv[1], encoding="utf-8"))["version"]; print(value or "")' "$PLAN")"
          REASON="$(python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["reason"])' "$PLAN")"
          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Prepare release projection
        if: steps.plan.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          VERSION='${{ steps.plan.outputs.version }}'
          python -m service.data_package.cli set-version --version "$VERSION"
          python -m service.data_package.cli finalize-release \
            --version "$VERSION" \
            --snapshot '${{ steps.quality.outputs.snapshot }}' >/dev/null
          python -m service.data_package.cli refresh-manifest >/dev/null

      - name: Verify npm package
        if: steps.plan.outputs.should_publish == 'true'
        working-directory: packages/kancolle-data
        run: |
          set -euo pipefail
          npm run check
          npm run check:fresh
          npm pack --dry-run

      - name: Ensure main did not move during collection
        if: steps.plan.outputs.should_publish == 'true' && (github.event_name == 'schedule' || inputs.publish == true)
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          test '${{ github.sha }}' = "$(git rev-parse origin/main)" || {
            echo 'origin/main changed while the Spider was running; refusing to publish from a stale base.' >&2
            exit 1
          }

      - name: Validate publish credentials
        if: steps.plan.outputs.should_publish == 'true' && (github.event_name == 'schedule' || inputs.publish == true)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${NODE_AUTH_TOKEN:-}" || {
            echo 'Repository secret NPM_TOKEN is required before publishing.' >&2
            exit 1
          }

      - name: Export generated online state
        if: steps.plan.outputs.should_publish == 'true' && (github.event_name == 'schedule' || inputs.publish == true)
        id: online
        run: |
          set -euo pipefail
          STATE_DIR="$RUNNER_TEMP/online-state"
          python - "$STATE_DIR" '${{ steps.quality.outputs.snapshot }}' '${{ github.sha }}' <<'PY'
          import json
          import sys
          from pathlib import Path
          from service.generated_state import export_generated_state

          result = export_generated_state(
              output_dir=Path(sys.argv[1]),
              base_ref="main",
              base_commit=sys.argv[3],
              verification_report=Path(sys.argv[2]),
              replace=True,
          )
          print(json.dumps(result, ensure_ascii=False))
          PY
          echo "path=$STATE_DIR" >> "$GITHUB_OUTPUT"

      - name: Push prepared online state
        if: steps.plan.outputs.should_publish == 'true' && (github.event_name == 'schedule' || inputs.publish == true)
        run: |
          set -euo pipefail
          STATE_DIR='${{ steps.online.outputs.path }}'
          INDEX="$RUNNER_TEMP/online-state.index"
          rm -f "$INDEX"
          export GIT_INDEX_FILE="$INDEX"
          git read-tree --empty
          git --work-tree="$STATE_DIR" add -A
          TREE="$(git write-tree)"
          VERSION='${{ steps.plan.outputs.version }}'
          COMMIT="$(printf 'Publish generated data %s\n' "$VERSION" | \
            GIT_AUTHOR_NAME='github-actions[bot]' \
            GIT_AUTHOR_EMAIL='41898282+github-actions[bot]@users.noreply.github.com' \
            GIT_COMMITTER_NAME='github-actions[bot]' \
            GIT_COMMITTER_EMAIL='41898282+github-actions[bot]@users.noreply.github.com' \
            git commit-tree "$TREE")"

          REMOTE_SHA="$(git ls-remote --heads origin refs/heads/online | awk '{print $1}')"
          git push \
            "--force-with-lease=refs/heads/online:${REMOTE_SHA}" \
            origin "$COMMIT:refs/heads/online"

      - name: Publish data package
        if: steps.plan.outputs.should_publish == 'true' && (github.event_name == 'schedule' || inputs.publish == true)
        working-directory: packages/kancolle-data
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --access public --tag latest

      - name: Report validation-only result
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        run: |
          echo "完整主流程验证通过。数据变化：${{ steps.quality.outputs.changed }}；版本计划：${{ steps.plan.outputs.reason }}。"

      - name: Report unchanged data
        if: steps.plan.outputs.should_publish != 'true'
        run: |
          echo '数据未变化，且当前计划版本已存在；无需发布。'
